<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DU EEE 59th Batch</title>
    <link rel="stylesheet" href="../assets/css/style.css?v=2">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Particle Canvas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="../assets/images/du-logo.png" alt="Dhaka University Logo">
                <img src="../assets/images/eee-logo.png" alt="EEE Department Logo">
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="btn btn-secondary">Visit Site</a></li>
                <li><a href="login.html" class="btn btn-danger" id="logout-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Dashboard Container -->
    <section class="dashboard page-main">
        <div class="container">
            <h2>Admin Dashboard</h2>
            <div class="dashboard-tabs">
                <button class="tab-btn active" data-tab="academics">Academic Resources</button>
                <button class="tab-btn" data-tab="routine">Class Routine</button>
            </div>
            <div class="tab-content">
                <!-- Academic Resources Tab -->
                <div class="tab-pane active" data-tab="academics">
                    <h3>Manage Academic Resources</h3>
                    <p>Edit the content for each semester's tab pane in the Academics page.</p>
                    <div class="semester-manager">
                        <!-- Semester tabs will be generated by JS -->
                    </div>
                </div>
                <!-- Class Routine Tab -->
                <div class="tab-pane" data-tab="routine">
                    <h3>Manage Class Routine</h3>
                    <p>Edit the course data for each year and semester.</p>
                    <div class="routine-manager">
                        <!-- Controls will be generated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DU EEE 59th Batch. All rights reserved.</p>
            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/particles.js?v=2"></script>
    <script src="../assets/js/main.js?v=2"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
